<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MANKIND</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="header-rune" aria-hidden="true">⟁◈⟁</span>
    </div>
    <div class="header-core">
      <div class="header-sigil" aria-hidden="true">☩</div>
      <h1 class="logo-text">MANKIND</h1>
    </div>
    <button class="header-cart-btn" id="open-cart" onclick="openCart()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="header-cart-count" id="header-cart-count">0</span>
    </button>
  </header>

  <!-- Divider -->
  <div class="cyber-divider" aria-hidden="true">
    <span>⸻ ◆ CATALOG://COLLECTION ◆ ⸻</span>
  </div>

  <!-- Product grid -->
  <main id="app">
    <div id="product-grid"></div>
  </main>

  <!-- Cart modal -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()">
    <div class="cart-modal" onclick="event.stopPropagation()">
      <div class="cart-header">
        <span class="cart-title">⟁ CART</span>
        <button class="cart-close-btn" onclick="closeCart()">✕</button>
      </div>
      <div class="cart-body" id="cart-body">
        <div class="cart-empty" id="cart-empty">
          <span class="cart-empty-icon">◇</span>
          <span>EMPTY VESSEL</span>
        </div>
      </div>
      <div class="cart-footer" id="cart-footer">
        <div class="cart-total-row">
          <span>TOTAL</span>
          <span class="cart-total-value" id="cart-total-value">0 $</span>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
