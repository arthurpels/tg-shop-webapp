<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mini Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen transition-colors duration-200">

  <header class="sticky top-0 z-10 backdrop-blur-lg bg-opacity-80 border-b px-4 py-3">
    <h1 class="text-xl font-bold tracking-tight text-center">Mini Shop</h1>
  </header>

  <main id="app" class="px-4 pt-4 pb-28">
    <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
  </main>

  <div id="cart-badge"
       class="fixed bottom-24 right-4 z-20 hidden items-center gap-1.5 rounded-full px-3 py-1.5 text-xs font-semibold shadow-lg transition-all">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span id="cart-count">0</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
