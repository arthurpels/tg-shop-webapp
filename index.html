<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MANKIND</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <header class="app-header">
    <div class="header-rune" aria-hidden="true">⟁ ◈ ⟁</div>
    <div class="header-core">
      <div class="header-sigil" aria-hidden="true">☩</div>
      <h1 class="logo-text">MANKIND</h1>
    </div>
    <div class="header-rune" aria-hidden="true">⟁ ◈ ⟁</div>
  </header>

  <div class="cyber-divider" aria-hidden="true">
    <span>⸻ ◆ CATALOG://PRODUCTS ◆ ⸻</span>
  </div>

  <main id="app">
    <div id="product-grid"></div>
  </main>

  <div id="cart-badge" class="cart-badge">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>

  <script src="app.js"></script>
